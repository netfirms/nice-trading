<div class="space-y-4">
    {% for config in bot_configs %}
    <div class="flex items-center justify-between p-4 bg-slate-800/40 rounded-xl border border-slate-700/50 hover:border-slate-600 transition">
        <div>
            <div class="font-bold text-slate-100">{{ config.symbol }}</div>
            <div id="price-{{ config.symbol|replace('/', '-') }}" class="text-lg font-mono text-slate-300 transition-colors duration-500">
                $---
            </div>
            <div class="text-xs text-slate-500 uppercase tracking-tighter">{{ config.strategy }}</div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs {% if config.is_active %}text-emerald-400 animate-pulse{% else %}text-rose-400{% endif %}">
                ● {% if config.is_active %}Active{% else %}Inactive{% endif %}
            </span>
            <button class="px-3 py-1 rounded-md text-sm font-medium transition
                           {% if config.is_active %}bg-rose-500/10 text-rose-400 hover:bg-rose-500/20{% else %}bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20{% endif %}"
                    hx-post="/bots/toggle/{{ config.symbol|replace('/', '%2F') }}"
                    hx-target="#bot-list-container">
                {% if config.is_active %}Stop{% else %}Start{% endif %}
            </button>
        </div>
    </div>
    {% endfor %}

    <form hx-post="/bots/add" hx-target="#bot-list-container" class="pt-4 border-t border-slate-800">
        <div class="flex gap-2">
            <input type="text" name="symbol" placeholder="BTC/USDT" required
                   class="bg-slate-900 border border-slate-700 rounded-lg flex-1 text-slate-200 px-3 py-2 text-sm focus:border-blue-500 outline-none">
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold transition">Add Bot</button>
        </div>
    </form>
</div>
