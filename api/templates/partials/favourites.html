<div class="flex flex-wrap gap-2">
    {% for fav in favourites %}
    <div class="bg-slate-800/60 px-3 py-1.5 rounded-full border border-slate-700 flex items-center gap-2 group">
        <span class="text-sm font-medium text-slate-300">{{ fav }}</span>
        <button class="text-slate-500 hover:text-rose-400 transition" hx-post="/favourites/remove/{{ fav|replace('/', '%2F') }}" hx-target="#favourites-container">
            ×
        </button>
    </div>
    {% endfor %}
    
    <form hx-post="/favourites/add" hx-target="#favourites-container" class="inline-block">
        <input type="text" name="symbol" placeholder="+ Asset" 
               class="bg-transparent border border-slate-700 border-dashed rounded-full px-3 py-1 text-xs text-slate-500 focus:text-slate-200 focus:border-blue-500 outline-none w-20 focus:w-32 transition-all">
    </form>
</div>
