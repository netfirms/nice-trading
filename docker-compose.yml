services:
  # --- Gateway & Security ---
  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - trading-network

  postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASS:-password}
      - POSTGRES_DB=${DB_NAME:-trading_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  questdb:
    image: docker.io/questdb/questdb:latest
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:9003/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - trading-network

  # --- Application Layer ---
  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      questdb:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - trading-network

  manager:
    build: .
    command: python manager/bot_manager.py
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - trading-network

  orderbook-worker:
    build: .
    command: ./orderbook-worker-go
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      questdb:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  questdb_data:
  postgres_data:

# --- Global Logging Policy ---
logging:
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
